<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="images/logo.png">
    <title>Gawla</title>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="login-card w-100">
  <div class="row h-100 ">
    
    <div class="col-md-4 col-4 pic ">
    </div>

    <div class="col-md-8 col-8 main-bg d-flex flex-column justify-content-center">
        <div class="d-flex flex-column   my-4">
            <div>
                <div class="d-flex align-items-center">
                    <img src="images/key.png" width="25" class="me-2">
                    <h2 class="mb-0 me-2 ther-color">Reset your password</h2>
                    
                </div>
                <p class=" my-3 ther-color welcome-text">Enter a new password for your account</p>
            </div>

    </div>
    <div class="container  d-flex justify-content-center">
        <div class="form-box w-100">
            <form class="d-flex flex-column  m-1 " action="login.php" method="POST">
                <div class="mb-3 position-relative">
                <label for="password" class="form-label fw-bold ther-color">Password</label>

                <input type="password" class="form-control pe-5 color-big box  main-password" 
                 placeholder="Enter your password......">

                    <i class="bi bi-eye position-absolute togglePassword end-0 translate-middle-x me-3" style="cursor: pointer;"></i>

                </div>
                <p  class="password-message fw-lighter welcome-text text-muted">*Must be at least 8 characters, including a number and a symbol.</p>

                <div class="mb-3 position-relative">
                <label for="confirmPassword" class="form-label fw-bold ther-color">Confirm password</label>

                <input type="password" class="form-control confirm-password pe-5 color-big box "
                 placeholder="Enter your password......">

                    <i class="bi bi-eye position-absolute togglePassword end-0 translate-middle-x me-3" style="cursor: pointer;"></i>

                </div>
                <div class="alert text-danger d-flex d-none password-error">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <p>Passwords do not match</p>
                </div>
<div class="alert text-danger d-flex errorAlert" style="display: none;"></div>
<button type="button"
        class="border-0 rounded-2 p-2 bg-gold mt-3 reset-btn">
    Reset password
</button>
<div class="modal fade password-modal"  tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body bg-gold text-white p-3 rounded-3 position-relative">
Password updated successfully
        <button type="button"
                class="btn position-absolute top-0 end-0 m-2 text-white"
                data-bs-dismiss="modal">
            <i class="bi bi-x-lg"></i>
        </button>
      </div>

    </div>
  </div>
</div>
            </form>


  </div>
</div>







    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
