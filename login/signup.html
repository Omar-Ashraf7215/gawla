<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="images/logo.png">
    <title>Gawla</title>
</head>
<body class="d-flex justify-content-center align-items-center m-md-5">
    <div class="login-card w-100  ">
  <div class="row h-100 ">
    
    <div class="col-md-4 col-4 pic ">
    </div>

    <div class="col-md-8 col-8 main-bg ">
        <div class="d-flex flex-column   m-3">
            <div>
                <div class="d-flex align-items-center">
                    <img src="images/star.png" class="me-2" width="25">
                    <h2 class="mb-0 me-2 ther-color">create your account</h2>
                </div>
                <p class=" my-3 ther-color welcome-text fw-bolder">start your journey with gawla</p>
            </div>

    </div>
    <div class="container  d-flex justify-content-center">
        <div class="form-box w-100">
            <form class="d-flex flex-column  m-1 " action="login.php" method="POST">
                <div class="mb-3">
                    <label for="text" class="form-label ther-color fw-bold ">Full Name</label>
                    <input type="text" class="form-control  color-big box " id="text" name="text" placeholder="Enter your Name....." required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label ther-color fw-bold ">Email </label>
                    <input type="email" class="form-control  color-big box " id="email" name="email" placeholder="Enter your email....." required>
                </div>
            <div class="mb-3 position-relative">
                            <label for="password" class="form-label fw-bold ther-color">Password</label>

                            <input type="password" class="form-control pe-5 color-big box  main-password" 
                            placeholder="Enter your password......">

                                <i class="bi bi-eye position-absolute togglePassword end-0 translate-middle-x me-3" style="cursor: pointer;"></i>

                            </div>
                            <p  class="password-message fw-lighter welcome-text text-muted">*Must be at least 8 characters, including a number and a symbol.</p>

                            <div class="mb-3 position-relative">
                            <label for="confirmPassword" class="form-label fw-bold ther-color">Confirm password</label>

                            <input type="password" class="form-control confirm-password pe-5 color-big box "
                            placeholder="Enter your password......">

                                <i class="bi bi-eye position-absolute togglePassword end-0 translate-middle-x me-3" style="cursor: pointer;"></i>

                            </div>
                            <div class="alert text-danger d-flex d-none password-error">
                                <i class="bi bi-exclamation-circle me-2"></i>
                                <p>Passwords do not match</p>
                            </div>
            <div class="alert text-danger d-flex errorAlert" style="display: none;"></div>
            <div class="modal fade password-modal"  tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                <div class="modal-body bg-gold text-white p-3 rounded-3 position-relative">
            Password updated successfully
                    <button type="button"
                            class="btn position-absolute top-0 end-0 m-2 text-white"
                            data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                </div>
            </div>
            </div>
                <div class="mb-3 position-relative">
                <label for="phone" class="form-label fw-bold ther-color">phone number</label>

                <input type="text" class="form-control pe-5 color-big box" id="phone"
                 placeholder="Enter your phone number......">
                </div>
               <div class="d-flex justify-content-between align-items-center mb-4">
    
                    <div >
                        <label class="form-check-label fw-lighter ther-color labol " for="rememberMe">i agree to the terms & conditions</label>
                        <input type="checkbox" class="form-check-input " id="rememberMe">
                    </div>

                </div>

                <button type="button"
        class="signup-btn border-0 rounded-2 p-2 bg-gold text-white">
    Sign up
</button>
            </form>
<div class="d-flex align-items-center my-3 ther-color">
    <hr class="flex-grow-1">
    <span class="mx-2">OR</span>
    <hr class="flex-grow-1">
</div>
<div class="d-flex flex-column  m-3 ">
    <button class=" border-0 rounded-2 p-2  mb-2 d-flex align-items-center justify-content-center color-big ther-color welcome-text">
        <i class="bi bi-google me-3"></i> Sign in with Google
    </button>
    <button class="border-0 rounded-2 p-2  d-flex align-items-center justify-content-center color-big ther-color welcome-text">
        <i class=" bi bi-apple me-2"></i> continue with apple
    </button>

  </div>
  <div class="d-flex justify-content-center">
      <p href="#" class="text-decoration-none ther-color welcome-text">don’t have an account?</p>
      <a href="index.html" class="text-decoration-none ms-2 font-gold welcome-text">log in</a>
  </div>
  </div>
</div>







    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
